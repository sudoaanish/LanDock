<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LanDock Client</title>
    <link rel="stylesheet" href="global.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; /* Fixed viewport height bug in Safari */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Status Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            height: 54px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(8, 9, 12, 0.4);
            z-index: 10;
        }

        .bar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .latency-badge {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 12px;
            font-family: monospace;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .settings-btn {
            background: none;
            border: none;
            box-shadow: none;
            padding: 8px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Viewport Container */
        .views-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .view-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 16px;
        }

        .view-panel.active {
            display: flex;
        }

        /* Trackpad Tab */
        .trackpad-view {
            padding: 12px;
        }

        .trackpad-surface {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            position: relative;
            background: radial-gradient(circle at center, rgba(6, 182, 212, 0.04) 0%, transparent 80%), var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 2px 20px rgba(255,255,255,0.02);
            /* Touchpad dotted grid pattern */
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
            touch-action: none;
        }

        .trackpad-surface:active {
            border-color: rgba(6, 182, 212, 0.25);
            box-shadow: inset 0 2px 25px rgba(6, 182, 212, 0.04);
        }

        .trackpad-guide {
            pointer-events: none;
            opacity: 0.35;
            transition: opacity 0.3s ease;
        }

        .trackpad-surface.touched .trackpad-guide {
            opacity: 0.1;
        }

        .trackpad-guide svg {
            margin-bottom: 12px;
            color: var(--accent);
        }

        /* Keyboard Tab */
        .keyboard-view {
            gap: 16px;
        }

        .hidden-textbox {
            position: absolute;
            left: -9999px;
            opacity: 0;
            z-index: -1;
        }

        .keyboard-trigger-btn {
            width: 100%;
            height: 80px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 16px;
        }

        .utility-keyboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex-grow: 1;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            box-shadow: none;
            padding: 0;
            height: 100%;
            max-height: 70px;
        }

        .key-btn:active {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .key-btn svg {
            width: 18px;
            height: 18px;
            opacity: 0.8;
        }

        /* Clipboard Tab */
        .clipboard-view {
            gap: 12px;
        }

        .client-textarea {
            width: 100%;
            flex-grow: 1;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 16px;
        }

        .clipboard-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .clipboard-actions {
            display: flex;
            gap: 10px;
        }

        .clipboard-actions button {
            flex: 1;
            height: 50px;
            border-radius: 12px;
        }

        /* Bottom Tab Navigator */
        .bottom-nav {
            display: flex;
            height: 64px;
            border-top: 1px solid var(--border-color);
            background: rgba(8, 9, 12, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent);
            background: radial-gradient(circle at bottom, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            transition: transform 0.2s ease;
        }

        .nav-item.active svg {
            transform: translateY(-2px);
        }

        /* Settings Overlay Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-panel {
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            background: var(--bg-dark);
            border-top: 1px solid var(--border-color);
            padding: 24px 24px 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-panel {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-modal-btn {
            background: none;
            border: none;
            padding: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .setting-label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-name {
            font-size: 14px;
            font-weight: 500;
        }

        .setting-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Custom toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Custom range slider */
        .range-slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
        }

        .range-input {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            padding: 0;
            border: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: none;
        }
    </style>
</head>
<body class="fade-in">
    <!-- Top Status Bar -->
    <div class="top-bar">
        <div class="bar-title">
            <img src="logo.png" alt="LanDock" style="height: 38px; object-fit: contain; margin-right: 8px;">
            <span id="conn-indicator" class="glow-indicator disconnected"></span>
            <span id="conn-status-text">Connecting</span>
        </div>
        <div class="bar-actions">
            <span id="latency-val" class="latency-badge">-- ms</span>
            <button id="settings-open" class="settings-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <!-- View Panels Container -->
    <div class="views-container">
        <!-- View 1: Trackpad (Active by Default) -->
        <div id="view-trackpad" class="view-panel active trackpad-view">
            <div id="tp-surface" class="trackpad-surface">
                <div class="trackpad-guide">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
                    <p style="font-weight: 500; font-size: 15px; color: var(--text-main); margin-bottom: 6px;">Precision Touch Area</p>
                    <p style="font-size: 12px; max-width: 200px; line-height: 1.4;">Drag: cursor. 2-finger drag: scroll. Tap: left-click. 2-tap: right-click.</p>
                </div>
            </div>
        </div>

        <!-- View 2: Keyboard -->
        <div id="view-keyboard" class="view-panel keyboard-view">
            <!-- Hidden input to prompt standard iOS keyboard -->
            <textarea id="hidden-input" class="hidden-textbox" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"></textarea>
            
            <button id="keyboard-trigger" class="keyboard-trigger-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.01"></path><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M18 8h.01"></path><path d="M6 12h.01"></path><path d="M18 12h.01"></path><path d="M7 16h10"></path><path d="M10 12h4"></path></svg>
                Summon Keyboard
            </button>

            <div class="utility-keyboard-grid">
                <!-- Utility row keys -->
                <button class="key-btn" data-key-idx="18"><span>ESC</span></button>
                <button class="key-btn" data-key-idx="8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line></svg><span>WIN</span></button>
                <button class="key-btn" data-key-idx="15"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span>BACK</span></button>
                <button class="key-btn" data-key-idx="17"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 10h12v5gM9 10l4-4M9 10l4 4"/></svg><span>ENTER</span></button>

                <button class="key-btn" data-key-idx="19"><span>SPACE</span></button>
                <button class="key-btn" data-key-idx="16"><span>DEL</span></button>
                <button class="key-btn" data-key-idx="0"><span>MUTE</span></button>
                <button class="key-btn" data-key-idx="3"><span>PLAY</span></button>

                <button class="key-btn" data-key-idx="1"><span>VOL -</span></button>
                <button class="key-btn" data-key-idx="2"><span>VOL +</span></button>
                <button class="key-btn" data-key-idx="4"><span>PREV</span></button>
                <button class="key-btn" data-key-idx="5"><span>NEXT</span></button>

                <!-- Arrow Keys -->
                <button class="key-btn" data-key-idx="13"><span>HOME</span></button>
                <button class="key-btn" data-key-idx="11"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg><span>UP</span></button>
                <button class="key-btn" data-key-idx="14"><span>END</span></button>
                <button class="key-btn" style="visibility: hidden;"></button>

                <button class="key-btn" data-key-idx="9"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span>LEFT</span></button>
                <button class="key-btn" data-key-idx="12"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg><span>DOWN</span></button>
                <button class="key-btn" data-key-idx="10"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg><span>RIGHT</span></button>
                <button class="key-btn" style="visibility: hidden;"></button>
            </div>
        </div>

        <!-- View 3: Clipboard -->
        <div id="view-clipboard" class="view-panel clipboard-view">
            <textarea id="clip-area" class="client-textarea" placeholder="Paste or type text to send to PC clipboard..."></textarea>
            <div class="clipboard-status-bar">
                <span id="clip-status">Ready</span>
                <span style="font-size: 11px; opacity: 0.7;">Local LAN Sync</span>
            </div>
            <div class="clipboard-actions">
                <button id="clip-pull-btn" class="secondary">Copy from PC</button>
                <button id="clip-push-btn">Paste to PC</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigator -->
    <div class="bottom-nav">
        <div class="nav-item active" data-target="view-trackpad">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="12" x2="21" y2="12"></line></svg>
            Trackpad
        </div>
        <div class="nav-item" data-target="view-keyboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M18 12h.01M7 16h10M10 12h4"></path></svg>
            Keyboard
        </div>
        <div class="nav-item" data-target="view-clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
            Clipboard
        </div>
    </div>

    <!-- Settings Overlay Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-panel">
            <div class="modal-header">
                <span class="modal-title">LanDock Settings</span>
                <button id="settings-close" class="close-modal-btn">Done</button>
            </div>
            
            <!-- Toggle Natural Scrolling -->
            <div class="settings-row">
                <div class="setting-label">
                    <span class="setting-name">Natural Scrolling</span>
                    <span class="setting-desc">Slide fingers up to scroll up</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-natural-scroll" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Pointer Sensitivity -->
            <div class="range-slider-container">
                <div class="range-header">
                    <span>Touchpad Sensitivity</span>
                    <span id="sensitivity-val">1.2x</span>
                </div>
                <input type="range" id="setting-sensitivity" class="range-input" min="0.4" max="3.0" step="0.1" value="1.2">
            </div>

            <!-- Scroll Sensitivity -->
            <div class="range-slider-container">
                <div class="range-header">
                    <span>Scroll Sensitivity</span>
                    <span id="scroll-sens-val">1.0x</span>
                </div>
                <input type="range" id="setting-scroll-sens" class="range-input" min="0.4" max="2.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <script src="client.js"></script>
    <script>
        // Register Service Worker for offline installation support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('LanDock Service Worker Registered'))
                .catch(err => console.warn('Service worker registration failed:', err));
        }
    </script>
</body>
</html>
