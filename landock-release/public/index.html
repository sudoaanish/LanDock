<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanDock Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 24px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            height: 48px;
        }

        .logo img {
            height: 48px;
            object-fit: contain;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.1fr 1.9fr;
            gap: 20px;
            height: 100%;
            min-height: 0; /* Important for scroll containers */
        }

        .panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Connection / QR Code Styles */
        .connection-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
        }

        .qr-card {
            text-align: center;
            margin-bottom: 20px;
        }

        .qr-card img {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin: 12px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .endpoint-url {
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 8px;
            word-break: break-all;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Right Column Split */
        .right-column {
            display: grid;
            grid-template-rows: 1fr 1.2fr;
            gap: 20px;
            min-height: 0;
        }

        /* Clipboard Styles */
        .clipboard-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .clipboard-textarea {
            width: 100%;
            flex-grow: 1;
            resize: none;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .clipboard-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* Event Logs */
        .log-list {
            flex-grow: 1;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #10b981; /* neon console green */
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-bottom: 4px;
        }

        .log-time {
            color: var(--text-muted);
            margin-right: 8px;
        }

        .log-message {
            color: #e5e7eb;
        }
    </style>
</head>
<body class="fade-in">
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo">
                <img src="logo.png" alt="LanDock Logo">
            </div>
            <div class="status-badge">
                <span id="status-indicator" class="glow-indicator"></span>
                <span id="status-text">Server Active</span>
                <span id="connections-count" style="margin-left: 6px; font-weight: 600; color: var(--accent);">0 clients</span>
            </div>
        </header>

        <!-- Content Grid -->
        <main class="main-grid">
            <!-- Left Side: Connection QR Codes -->
            <div class="panel glass-panel">
                <div class="panel-title">Scan to Connect</div>
                <div id="connection-list" class="connection-list">
                    <!-- Loaded dynamically -->
                    <div style="text-align: center; color: var(--text-muted); padding-top: 50px;">Detecting local adapters...</div>
                </div>
            </div>

            <!-- Right Side: Clipboard and Event Log -->
            <div class="right-column">
                <!-- Clipboard -->
                <div class="panel glass-panel">
                    <div class="panel-title">
                        <span>Universal Clipboard</span>
                        <span style="font-size: 12px; font-weight: normal; color: var(--text-muted);">Auto-syncs with iPhone</span>
                    </div>
                    <div class="clipboard-container">
                        <textarea id="clipboard-area" class="clipboard-textarea" placeholder="Clipboard content will appear here..."></textarea>
                        <div class="clipboard-actions">
                            <button id="clear-clip-btn" class="secondary">Clear</button>
                            <button id="copy-clip-btn" class="secondary">Copy to system</button>
                            <button id="sync-clip-btn">Push to iPhone</button>
                        </div>
                    </div>
                </div>

                <!-- Event Logs -->
                <div class="panel glass-panel">
                    <div class="panel-title">Real-time Session Feed</div>
                    <div id="log-list" class="log-list">
                        <div class="log-entry"><span class="log-time">[System]</span> <span class="log-message">Awaiting connections...</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
