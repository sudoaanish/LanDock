name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tauri Desktop Client & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LanDock ${{ github.ref_name }}'
          releaseBody: |
            ### LanDock ${{ github.ref_name }}
            
            LanDock turns your Windows PC into a local Wi-Fi hub for your iPhone. Install the Windows MSI, launch LanDock, scan the QR code, and use your iPhone as a local trackpad, keyboard, clipboard bridge, and file drop client.
            
            Release highlights:
            * Self-contained Windows MSI with bundled Node.js runtime.
            * QR-based local pairing, with Windows Mobile Hotspot support.
            * Recommended hotspot QR target: `192.168.137.1`.
            * iPhone web client with Add to Home Screen support.
            * Clipboard bridge, file transfer, keyboard, and pointer controls.
            
            Installation:
            * Windows: Download and run the `.msi` installer attached to this release.
          releaseDraft: true
          prerelease: false
