name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Tauri Desktop Client & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LanDock Hub ${{ github.ref_name }}'
          releaseBody: |
            ### LanDock Hub ${{ github.ref_name }}
            
            Welcome to the official release of **LanDock Hub**! LanDock turns your iPhone into a multi-touch trackpad, keyboard, universal clipboard sync, and bidirectional file dropzone for your computer—running entirely over local Wi-Fi / Hotspot networks with no iOS app installation required.
            
            #### 🚀 Release highlights
            * **Universal Clipboard Sync**: Dynamic sync between Windows and iPhone clipboards.
            * **Bidirectional File Sharing**: Drop files on the desktop app to push to iPhone, or capture/upload from iPhone directly to your Windows Downloads folder.
            * **Win32 Input Emulation**: Multi-touch trackpad gestures (scrolling, clicking, dragging) emulated locally.
            * **Installer Bundles**: Native installers generated for Windows (`.msi`), macOS (`.dmg`), and Linux (`.deb` / `.AppImage`).
            
            #### 📦 Installation
            * **Windows**: Download and run `LanDock_${{ github.ref_name }}_x64_en-US.msi`.
            * **macOS**: Mount `LanDock_${{ github.ref_name }}_universal.dmg` and drag to Applications.
            * **Linux**: Install the `.deb` package or launch the standalone `.AppImage`.
          releaseDraft: true
          prerelease: false
